site_name: PyBGPKITStream
site_description: A drop-in replacement for PyBGPStream using BGPKIT
site_author: JustinLoye
repo_url: https://github.com/JustinLoye/pybgpkitstream
repo_name: pybgpkitstream

theme:
  name: material
  palette:
    - scheme: slate
      primary: blue
      accent: orange
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
    - scheme: default
      primary: blue
      accent: orange
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - User Guide:
      - Configuration: guide/configuration.md
      - Streaming Data: guide/streaming.md
      - Filtering: guide/filtering.md
      - CLI Tool: guide/cli.md
  - API Reference:
      - Overview: api/overview.md
      - BGPKITStream: api/bgpkitstream.md
      - Configuration: api/configuration.md
      - BGPElement: api/bgpelement.md
      - Parsers: api/parsers.md
  - Performance: performance.md
  - FAQ: faq.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_bases: true
            show_root_heading: true
            heading_level: 2
            show_field_summary: false
            show_docstring_description: true
            members_order: source
            group_by_category: true
            extensions:
              - griffe_pydantic:
                  schema: true
            # show_if_no_docstring: true

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - tables
  - md_in_html
